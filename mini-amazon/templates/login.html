{% extends "base.html" %}
{% block title %}Login — Mini Amazon{% endblock %}
{% block content %}

<div class="auth-container">
  <div class="auth-card">
    <h2>🔐 Login</h2>
    <form action="{{ url_for('login') }}" method="post">
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" required placeholder="you@example.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••"/>
      </div>
      <button type="submit" class="btn-primary full-btn">Login</button>
    </form>
    <p class="auth-switch">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
    <div class="demo-creds">
      <strong>Demo Admin:</strong> admin@shop.com / admin123
    </div>
  </div>
</div>

{% endblock %}
