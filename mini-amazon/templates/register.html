{% extends "base.html" %}
{% block title %}Register — Mini Amazon{% endblock %}
{% block content %}

<div class="auth-container">
  <div class="auth-card">
    <h2>📝 Create Account</h2>
    <form action="{{ url_for('register') }}" method="post">
      <div class="field">
        <label>Full Name</label>
        <input type="text" name="name" required placeholder="Kavya Sharma"/>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" required placeholder="you@example.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" required placeholder="min 6 characters"/>
      </div>
      <button type="submit" class="btn-primary full-btn">Create Account</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
  </div>
</div>

{% endblock %}
